  <ellipse class="att" cx="575" cy="560" rx="52" ry="17"/><text class="attT" x="575" y="564">quantidade</text>
  <ellipse class="att" cx="705" cy="560" rx="58" ry="17"/><text class="attT" x="705" y="564">preco_unitario</text>

  <!-- relationships (diamonds) -->
  <polygon class="rel" points="243,410 305,376 367,410 305,444"/><text class="relT" x="305" y="414">realiza</text>
  <polygon class="rel" points="573,410 635,376 697,410 635,444"/><text class="relT" x="635" y="414">contém</text>
  <polygon class="rel" points="898,410 960,376 1022,410 960,444"/><text class="relT" x="960" y="414">classifica</text>

  <!-- entities (rectangles) -->
  <rect class="ent" x="75"   y="381" width="130" height="58" rx="6"/><text class="entT" x="140"  y="415">CLIENTE</text>
  <rect class="ent" x="405"  y="381" width="130" height="58" rx="6"/><text class="entT" x="470"  y="415">PEDIDO</text>
  <rect class="ent" x="735"  y="381" width="130" height="58" rx="6"/><text class="entT" x="800"  y="415">PRODUTO</text>
  <rect class="ent" x="1055" y="381" width="130" height="58" rx="6"/><text class="entT" x="1120" y="415">CATEGORIA</text>

  <!-- legend -->
  <rect class="ent" x="80" y="700" width="26" height="16" rx="3"/>
  <text class="leg" x="114" y="713">Entidade</text>
  <polygon class="rel" points="212,708 232,698 252,708 232,718"/>
  <text class="leg" x="262" y="713">Relacionamento</text>
  <ellipse class="att" cx="430" cy="708" rx="20" ry="11"/>
  <text class="leg" x="458" y="713">Atributo (PK sublinhado)</text>
  <ellipse class="att" cx="720" cy="708" rx="22" ry="13" fill="none"/><ellipse class="att" cx="720" cy="708" rx="17" ry="9"/>
  <text class="leg" x="750" y="713">Atributo multivalorado (borda dupla)</text>
  <text class="leg" x="80" y="748">Cardinalidade (mín,máx): quantas ocorrências da entidade vizinha se associam a UMA ocorrência da entidade oposta (notação Chen).</text>
</svg>
