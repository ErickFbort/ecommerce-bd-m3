<svg viewBox="0 0 1300 840" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <style>
    .title{fill:#0f172a;font-size:20px;font-weight:bold;text-anchor:middle}
    .tbl{fill:#ffffff;stroke:#475569;stroke-width:1.4}
    .hdr{fill:#1d4ed8}
    .hdrT{fill:#ffffff;font-size:14px;font-weight:bold;text-anchor:middle}
    .col{fill:#0f172a;font-size:12.5px}
    .colfk{fill:#b45309;font-size:12.5px}
    .colpk{fill:#0f172a;font-size:12.5px;font-weight:bold;text-decoration:underline}
    .typ{fill:#64748b;font-size:11.5px;text-anchor:end}
    .tagpk{fill:#1d4ed8;font-size:10px;font-weight:bold}
    .tagfk{fill:#b45309;font-size:10px;font-weight:bold}
    .rowln{stroke:#e2e8f0;stroke-width:1}
    .relS{stroke:#0f172a;stroke-width:1.7;fill:none}
    .relD{stroke:#0f172a;stroke-width:1.7;fill:none;stroke-dasharray:6 4}
    .mk{stroke:#0f172a;stroke-width:1.7;fill:none}
    .clab{fill:#0f172a;font-size:12px;font-weight:bold;text-anchor:middle}
    .leg{fill:#334155;font-size:12.5px}
    .legB{fill:#0f172a;font-size:13px;font-weight:bold}
  </style>

  <rect x="0" y="0" width="1300" height="840" fill="#ffffff" stroke="#e2e8f0"/>
  <text class="title" x="650" y="40">Diagrama Relacional (DR) — e-Commerce</text>

  <!-- ===== relationships (under tables) ===== -->
  <!-- pedido (N) --- cliente (1) : non-identifying -->
  <line class="relD" x1="610" y1="150" x2="1000" y2="150"/>
  <line class="mk" x1="636" y1="150" x2="610" y2="141"/><line class="mk" x1="636" y1="150" x2="610" y2="150"/><line class="mk" x1="636" y1="150" x2="610" y2="159"/>
  <line class="mk" x1="974" y1="141" x2="974" y2="159"/>
  <text class="clab" x="654" y="142">N</text><text class="clab" x="960" y="142">1</text>

  <!-- produto (N) --- categoria (1) : non-identifying -->
  <line class="relD" x1="610" y1="550" x2="1000" y2="550"/>
  <line class="mk" x1="636" y1="550" x2="610" y2="541"/><line class="mk" x1="636" y1="550" x2="610" y2="550"/><line class="mk" x1="636" y1="550" x2="610" y2="559"/>
  <line class="mk" x1="974" y1="541" x2="974" y2="559"/>
  <text class="clab" x="654" y="542">N</text><text class="clab" x="960" y="542">1</text>

  <!-- cliente (1) --- telefone_cliente (N) : non-identifying -->
  <line class="relD" x1="1120" y1="270" x2="1120" y2="310"/>
  <line class="mk" x1="1120" y1="290" x2="1111" y2="310"/><line class="mk" x1="1120" y1="290" x2="1120" y2="310"/><line class="mk" x1="1120" y1="290" x2="1129" y2="310"/>
  <line class="mk" x1="1106" y1="276" x2="1134" y2="276"/>
  <text class="clab" x="1150" y="282">1</text><text class="clab" x="1150" y="306">N</text>

  <!-- pedido (1) --- item_pedido (N) : identifying -->
  <path class="relS" d="M 380 224 H 330 V 380 H 300"/>
  <line class="mk" x1="300" y1="380" x2="280" y2="371"/><line class="mk" x1="300" y1="380" x2="280" y2="380"/><line class="mk" x1="300" y1="380" x2="280" y2="389"/>
  <line class="mk" x1="372" y1="215" x2="372" y2="233"/>
  <text class="clab" x="360" y="210">1</text><text class="clab" x="315" y="372">N</text>

  <!-- produto (1) --- item_pedido (N) : identifying -->
  <path class="relS" d="M 380 544 H 350 V 420 H 300"/>
  <line class="mk" x1="300" y1="420" x2="280" y2="411"/><line class="mk" x1="300" y1="420" x2="280" y2="420"/><line class="mk" x1="300" y1="420" x2="280" y2="429"/>
  <line class="mk" x1="372" y1="535" x2="372" y2="553"/>
  <text class="clab" x="360" y="540">1</text><text class="clab" x="315" y="436">N</text>

  <!-- ===== item_pedido ===== -->
  <rect class="tbl" x="60" y="320" width="220" height="150" rx="6"/>
  <rect class="hdr" x="60" y="320" width="220" height="30" rx="6"/><rect class="hdr" x="60" y="338" width="220" height="12"/>
  <text class="hdrT" x="170" y="340">item_pedido</text>
  <line class="rowln" x1="60" y1="380" x2="280" y2="380"/><line class="rowln" x1="60" y1="410" x2="280" y2="410"/><line class="rowln" x1="60" y1="440" x2="280" y2="440"/>
  <text class="tagpk" x="72" y="374">PK FK</text><text class="colpk" x="118" y="374">pedido_id</text><text class="typ" x="272" y="374">INT</text>
  <text class="tagpk" x="72" y="404">PK FK</text><text class="colpk" x="118" y="404">produto_id</text><text class="typ" x="272" y="404">INT</text>
  <text class="col" x="118" y="434">quantidade</text><text class="typ" x="272" y="434">INT</text>
  <text class="col" x="118" y="464">preco_unitario</text><text class="typ" x="272" y="464">DECIMAL(10,2)</text>

  <!-- ===== pedido ===== -->
  <rect class="tbl" x="380" y="110" width="230" height="180" rx="6"/>
  <rect class="hdr" x="380" y="110" width="230" height="30" rx="6"/><rect class="hdr" x="380" y="128" width="230" height="12"/>
  <text class="hdrT" x="495" y="130">pedido</text>
  <line class="rowln" x1="380" y1="170" x2="610" y2="170"/><line class="rowln" x1="380" y1="200" x2="610" y2="200"/><line class="rowln" x1="380" y1="230" x2="610" y2="230"/><line class="rowln" x1="380" y1="260" x2="610" y2="260"/>
  <text class="tagpk" x="392" y="164">PK</text><text class="colpk" x="438" y="164">id</text><text class="typ" x="602" y="164">INT</text>
  <text class="tagfk" x="392" y="194">FK</text><text class="colfk" x="438" y="194">cliente_id</text><text class="typ" x="602" y="194">INT</text>
  <text class="col" x="438" y="224">data_pedido</text><text class="typ" x="602" y="224">DATETIME</text>
  <text class="col" x="438" y="254">status</text><text class="typ" x="602" y="254">VARCHAR(30)</text>
  <text class="col" x="438" y="284">valor_total</text><text class="typ" x="602" y="284">DECIMAL(10,2)</text>

  <!-- ===== produto ===== -->
  <rect class="tbl" x="380" y="490" width="230" height="210" rx="6"/>
  <rect class="hdr" x="380" y="490" width="230" height="30" rx="6"/><rect class="hdr" x="380" y="508" width="230" height="12"/>
  <text class="hdrT" x="495" y="510">produto</text>
  <line class="rowln" x1="380" y1="550" x2="610" y2="550"/><line class="rowln" x1="380" y1="580" x2="610" y2="580"/><line class="rowln" x1="380" y1="610" x2="610" y2="610"/><line class="rowln" x1="380" y1="640" x2="610" y2="640"/><line class="rowln" x1="380" y1="670" x2="610" y2="670"/>
  <text class="tagpk" x="392" y="544">PK</text><text class="colpk" x="438" y="544">id</text><text class="typ" x="602" y="544">INT</text>
  <text class="col" x="438" y="574">nome</text><text class="typ" x="602" y="574">VARCHAR(150)</text>
  <text class="col" x="438" y="604">descricao</text><text class="typ" x="602" y="604">VARCHAR(500)</text>
  <text class="col" x="438" y="634">preco</text><text class="typ" x="602" y="634">DECIMAL(10,2)</text>
  <text class="col" x="438" y="664">estoque</text><text class="typ" x="602" y="664">INT</text>
  <text class="tagfk" x="392" y="694">FK</text><text class="colfk" x="438" y="694">categoria_id</text><text class="typ" x="602" y="694">INT</text>

  <!-- ===== cliente ===== -->
  <rect class="tbl" x="1000" y="90" width="240" height="180" rx="6"/>
  <rect class="hdr" x="1000" y="90" width="240" height="30" rx="6"/><rect class="hdr" x="1000" y="108" width="240" height="12"/>
  <text class="hdrT" x="1120" y="110">cliente</text>
  <line class="rowln" x1="1000" y1="150" x2="1240" y2="150"/><line class="rowln" x1="1000" y1="180" x2="1240" y2="180"/><line class="rowln" x1="1000" y1="210" x2="1240" y2="210"/><line class="rowln" x1="1000" y1="240" x2="1240" y2="240"/>
  <text class="tagpk" x="1012" y="144">PK</text><text class="colpk" x="1058" y="144">id</text><text class="typ" x="1232" y="144">INT</text>
  <text class="col" x="1058" y="174">nome</text><text class="typ" x="1232" y="174">VARCHAR(120)</text>
  <text class="col" x="1058" y="204">email</text><text class="typ" x="1232" y="204">VARCHAR(120)</text>
  <text class="col" x="1058" y="234">cpf</text><text class="typ" x="1232" y="234">VARCHAR(14)</text>
  <text class="col" x="1058" y="264">data_cadastro</text><text class="typ" x="1232" y="264">DATETIME</text>

  <!-- ===== telefone_cliente ===== -->
  <rect class="tbl" x="1000" y="310" width="240" height="150" rx="6"/>
  <rect class="hdr" x="1000" y="310" width="240" height="30" rx="6"/><rect class="hdr" x="1000" y="328" width="240" height="12"/>
  <text class="hdrT" x="1120" y="330">telefone_cliente</text>
  <line class="rowln" x1="1000" y1="370" x2="1240" y2="370"/><line class="rowln" x1="1000" y1="400" x2="1240" y2="400"/><line class="rowln" x1="1000" y1="430" x2="1240" y2="430"/>
  <text class="tagpk" x="1012" y="364">PK</text><text class="colpk" x="1058" y="364">id</text><text class="typ" x="1232" y="364">INT</text>
  <text class="tagfk" x="1012" y="394">FK</text><text class="colfk" x="1058" y="394">cliente_id</text><text class="typ" x="1232" y="394">INT</text>
  <text class="col" x="1058" y="424">numero</text><text class="typ" x="1232" y="424">VARCHAR(20)</text>
  <text class="col" x="1058" y="454">tipo</text><text class="typ" x="1232" y="454">VARCHAR(20)</text>

  <!-- ===== categoria ===== -->
  <rect class="tbl" x="1000" y="500" width="240" height="120" rx="6"/>
  <rect class="hdr" x="1000" y="500" width="240" height="30" rx="6"/><rect class="hdr" x="1000" y="518" width="240" height="12"/>
  <text class="hdrT" x="1120" y="520">categoria</text>
  <line class="rowln" x1="1000" y1="560" x2="1240" y2="560"/><line class="rowln" x1="1000" y1="590" x2="1240" y2="590"/>
  <text class="tagpk" x="1012" y="554">PK</text><text class="colpk" x="1058" y="554">id</text><text class="typ" x="1232" y="554">INT</text>
  <text class="col" x="1058" y="584">nome</text><text class="typ" x="1232" y="584">VARCHAR(80)</text>
  <text class="col" x="1058" y="614">descricao</text><text class="typ" x="1232" y="614">VARCHAR(255)</text>

  <!-- ===== legend ===== -->
  <rect x="60" y="730" width="1180" height="86" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="legB" x="80" y="756">Legenda</text>
  <line class="relS" x1="80" y1="778" x2="140" y2="778"/>
  <text class="leg" x="150" y="782">Identifying (sólida): a FK faz parte da PK — item_pedido (PK composta)</text>
  <line class="relD" x1="80" y1="800" x2="140" y2="800"/>
  <text class="leg" x="150" y="804">Non-identifying (tracejada): a FK é apenas uma coluna comum</text>
  <line class="mk" x1="800" y1="778" x2="840" y2="778"/><line class="mk" x1="800" y1="778" x2="780" y2="769"/><line class="mk" x1="800" y1="778" x2="780" y2="787"/>
  <text class="leg" x="852" y="782">Pé-de-galinha = lado "muitos" (N)</text>
  <text class="tagpk" x="800" y="804">PK</text><text class="leg" x="824" y="804">chave primária    ·    </text><text class="tagfk" x="978" y="804">FK</text><text class="leg" x="1000" y="804">chave estrangeira</text>
</svg>
